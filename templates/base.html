<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Set a cookie with the user's local date (YYYY-MM-DD) at local midnight
        function setUserLocalDateCookie() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const localDate = `${year}-${month}-${day}`;
            document.cookie = `user_local_date=${localDate}; path=/; SameSite=Lax`;
            return localDate;
        }
        // Check if cookie is stale and reload if needed
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }
        const todayStr = setUserLocalDateCookie();
        const cookieDate = getCookie('user_local_date');
        if (cookieDate && cookieDate !== todayStr) {
            // If cookie is stale, reload the page to update backend
            window.location.reload();
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Calorie Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Apply dark mode immediately to prevent white flash -->
    <script>
        // Check localStorage and apply dark mode before rendering
        if (localStorage.getItem("darkMode") === "true") {
            document.documentElement.classList.add("dark-mode");
        }
    </script>

    <script>
        // Set a cookie with the user's UTC date (YYYY-MM-DD) based on their local midnight
        // (legacy, can be removed if not needed)
        function setUserUtcDateCookie() {
            const now = new Date();
            const localMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const utcYear = localMidnight.getUTCFullYear();
            const utcMonth = String(localMidnight.getUTCMonth() + 1).padStart(2, '0');
            const utcDay = String(localMidnight.getUTCDate()).padStart(2, '0');
            const utcDate = `${utcYear}-${utcMonth}-${utcDay}`;
            document.cookie = `user_utc_date=${utcDate}; path=/; SameSite=Lax`;
        }
        setUserUtcDateCookie();
    </script>

    <style>
        /* Inline styles for the dark mode toggle button */
        .dark-mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: background-color 0.3s ease;
            z-index: 1000; /* Ensure it appears above other elements */
        }

        .dark-mode-toggle:hover {
            background-color: #45a049;
        }

        .dark-mode-toggle span {
            font-size: 1.2rem;
        }

        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #000;
            color: #fff;
            padding: 8px;
            z-index: 1000;
            transition: top 0.3s;
        }

        .skip-link:focus {
            top: 0;
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Dark Mode Toggle Button -->
    <button id="darkModeToggle" class="dark-mode-toggle" aria-label="Toggle Dark Mode">
        <span id="darkModeIcon">🌙</span>
    </button>

    <!-- Flash Messages (ARIA live region for accessibility) -->
    <div id="flash-messages" aria-live="polite" aria-atomic="true" role="status">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <ul class="flash-list">
              {% for category, message in messages %}
                <li class="flash-message {{ category }}" tabindex="0">{{ message }}</li>
              {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}
    </div>

    <!-- Main Content Block -->
    <div class="container" id="main-content" role="main">
        {% block content %}{% endblock %}
    </div>

    <!-- Dark Mode Toggle Script -->
    <script>
        // Handles dark mode toggle and icon update
        document.addEventListener("DOMContentLoaded", () => {
            const darkModeToggle = document.getElementById("darkModeToggle");
            const darkModeIcon = document.getElementById("darkModeIcon");
            const isDarkMode = localStorage.getItem("darkMode") === "true";

            // Apply dark mode if saved in localStorage
            if (isDarkMode) {
                document.body.classList.add("dark-mode");
                darkModeIcon.textContent = "☀️"; // Set icon to sun
            }

            // Toggle dark mode on button click
            darkModeToggle.addEventListener("click", () => {
                document.body.classList.toggle("dark-mode");
                const isDarkMode = document.body.classList.contains("dark-mode");
                localStorage.setItem("darkMode", isDarkMode); // Save preference

                // Update the icon
                darkModeIcon.textContent = isDarkMode ? "☀️" : "🌙";
            });
        });
    </script>
</body>
</html>
